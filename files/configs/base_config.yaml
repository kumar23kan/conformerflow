# ConformerFlow — base configuration
# All values can be overridden by CLI flags in train.py

# ── Training mode (single entry point) ───────────────────
# Single-head options (one generative model):
#   flow_matching | ot_cfm | ddpm | ddim | vae | score_matching
# Multi-head option (VAE + score_matching + flow_matching simultaneously):
#   multi_head
training_mode: flow_matching

representation:
  structure: se3_frames   # se3_frames | cartesian | distance_matrix | torsion_angles
  sequence:  onehot       # onehot | esm2_650m | esm2_3b | prot_t5 | none

model:
  d_model:          256
  d_latent:         16
  n_encoder_layers: 4
  n_flow_layers:    8
  n_heads:          8
  n_points:         4
  d_ff:             512
  dropout:          0.1

generative_model:
  type:              flow_matching   # set automatically from training_mode — do not edit directly
  sigma_min:         0.01
  ode_method:        heun            # heun | euler | rk4
  n_inference_steps: 20

ensemble_stats:
  covariance:  full_covariance   # full_covariance | diagonal | pca_topk | attention
  free_bits:   0.5
  n_pca_modes: 10
  latent_type: per_residue       # per_residue | global  (ablation: global pools over L)

training:
  batch_size:       4
  max_epochs:       100
  learning_rate:    0.0001
  weight_decay:     0.0001
  warmup_steps:     1000
  lr_decay_steps:   100000
  checkpoint_dir:   checkpoints
  n_gen_conformers: 10
  val_every:        500
  save_every:       2000
  max_grad_norm:    1.0
  loss_schedule:    fixed
  multi_gpu:        false
  use_bf16:         false
  seed:             42

loss:
  lambda_flow:      1.0
  lambda_ensemble:  1.0
  lambda_kl:        0.01
  lambda_diversity: 0.5
  lambda_geometry:  0.1
  lambda_chirality: 0.1
  min_spread:       0.5

logging:
  use_wandb:    false
  run_name:     conformerflow_run1
  log_every:    50
  project_name: conformerflow

data:
  max_residues: 800
  pdb_data_dir: pdb_data
  max_workers:  4

multi_head:
  enabled:             false   # set automatically from training_mode — do not edit directly
  lambda_vae_start:    1.0     # VAE weight at epoch 0
  lambda_vae_end:      0.0     # VAE weight after anneal_epochs
  lambda_score_start:  0.0     # score weight at epoch 0
  lambda_score_end:    0.1     # score weight after anneal_epochs
  anneal_epochs:       20      # epochs over which weights transition
  score_ema_alpha:     0.99    # EMA decay for score loss normalization
